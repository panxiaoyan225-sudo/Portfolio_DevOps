# Disable the automatic trigger on code push to avoid double-runs
trigger: none  # Disables trigger on code push

schedules:
# To input scheduled times for a pipeline trigger, use the cron syntax in the "cron" field.
# The numbers correspond to: minute, hour, day of month, month, day of week.
# For example, to run at midnight on January 1st every year, input:
- cron: "0 0 1 1 *"  # minute hour day(month) month day(week)
  displayName: "Manual Only Mode"
  branches:
    include:
    - main
  always: false # Change this to false so it only runs if code changes (which it won't)

# The 'pool' section specifies the environment (virtual machine image) in which the pipeline's jobs will run.
# 'ubuntu-latest' tells Azure Pipelines to use the latest available Ubuntu Linux virtual machine for this job.
pool:
  name: 'MyLocalLaptop'


# The 'variables' block below pulls secret variables (e.g., API tokens, URLs) from the Azure DevOps variable group named 'Portfolio-Secrets'.
# These secrets are securely injected into the pipeline at runtime, so sensitive data isn't hard-coded in the YAML or codebase.
variables:
- group: 'Portfolio-Secrets'

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'
      addToPath: true
    displayName: 'Set Python Version to 3.11'

  - script: |
      python -m pip install --upgrade pip
      if exist requirements.txt (
          pip install -r requirements.txt
      )
    displayName: 'Install dependencies'

  - script: |
      python monitor_portfolio.py
    env:
      SLACK_TOKEN: $(SLACK_TOKEN)
      PYTHONUTF8: 1  # This forces Windows to support emojis in the terminal
    displayName: 'Run Portfolio Monitor'