trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

# This links your pipeline to the 'Portfolio-Secrets' group in the Library
variables:
- group: 'Portfolio-Secrets'

steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.9'
    addToPath: true
  displayName: 'Set Python Version to 3.9'

- script: |
    python -m pip install --upgrade pip
    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
  displayName: 'Install dependencies'

- script: |
    # This runs your portfolio monitor once to ensure it works
    python monitor_portfolio.py
  env:
    # This maps the Library secret to an Environment Variable the script can read
    SLACK_WEBHOOK_URL: $(SLACK_WEBHOOK) 
  displayName: 'Run Portfolio Monitor Test'