# Disable the automatic trigger on code push to avoid double-runs
#trigger: none
trigger:
  branches:
    include:
      - main # enable the trigger, can be removed to disable the trigger

# This is your cron job configuration
schedules:
- cron: "0 */4 * * *"
  displayName: "Every 4 Hours Portfolio Warm-up"
  branches:
    include:
    - main
  always: true # Set to true to run even if you haven't changed the code

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: 'Portfolio-Secrets'

steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.9'
    addToPath: true
  displayName: 'Set Python Version to 3.9'

- script: |
    python -m pip install --upgrade pip
    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
  displayName: 'Install dependencies'

- script: |
    # Run a test script that checks if your Slack Webhook is valid 
    # and if your ticker list is not empty.
    python -m pytest tests/test_config.py
  displayName: 'Validate Logic & Config'

- script: |
    python monitor_portfolio.py
  env:
    SLACK_WEBHOOK_URL: $(SLACK_WEBHOOK)
  displayName: 'Run Portfolio Monitor'