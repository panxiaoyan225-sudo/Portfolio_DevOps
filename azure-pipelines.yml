# Disable the automatic trigger on code push to avoid double-runs
trigger: none  # Disables trigger on code push

schedules:
# To input scheduled times for a pipeline trigger, use the cron syntax in the "cron" field.
# The numbers correspond to: minute, hour, day of month, month, day of week.
# For example, to run at midnight on January 1st every year, input:
- cron: "0 0 1 1 *"  # minute hour day(month) month day(week)
  displayName: "Manual Only Mode"
  branches:
    include:
    - main
  always: false # Change this to false so it only runs if code changes (which it won't)

# The 'pool' section specifies the environment (virtual machine image) in which the pipeline's jobs will run.
# 'ubuntu-latest' tells Azure Pipelines to use the latest available Ubuntu Linux virtual machine for this job.
pool:
  name: 'MyLocalLaptop'


# The 'variables' block below pulls secret variables (e.g., API tokens, URLs) from the Azure DevOps variable group named 'Portfolio-Secrets'.
# These secrets are securely injected into the pipeline at runtime, so sensitive data isn't hard-coded in the YAML or codebase.
variables:
- group: 'Portfolio-Secrets'

steps:
  # Step 1: Set up the required Python version for the pipeline.
  # This ensures that Python 3.9 is used for all subsequent steps.
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.9'      # Specify Python version 3.9
      addToPath: true         # Adds the selected Python version to the system PATH
    displayName: 'Set Python Version to 3.9'

  # Step 2: Install dependencies.
  # This upgrades pip to the latest version.
  # If a requirements.txt file exists, it will install all dependencies listed in it.
  - script: |
      python -m pip install --upgrade pip
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    displayName: 'Install dependencies'

  # Step 3: Validate logic and configuration.
  # Runs unit tests located at tests/test_config.py using pytest.
  # These tests typically check for correct environment and configuration, such as the presence of
  # valid secrets (e.g., Slack Webhook) and a non-empty ticker list.
  # The pipeline will fail here if configuration is incorrect.
  - script: |
      # Run a test script that checks if your Slack Webhook is valid 
      # and if your ticker list is not empty.
      # It helps validate project configuration (such as secret variables or environment setup)
      # before proceeding further in the pipeline. If these tests fail, the pipeline will halt.
      python -m pytest tests/test_config.py
    displayName: 'Validate Logic & Config'

  # Step 4: Run the main portfolio monitoring script.
  - script: |
      python monitor_portfolio.py
    displayName: 'Run Portfolio Monitor'
    env:
      SLACK_TOKEN: $(SLACK_TOKEN)