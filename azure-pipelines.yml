schedules:
- cron: "0 11 * * *"
  displayName: "Daily Morning Warm-up (7 AM EST)"
  branches:
    include:
    - main
  always: true # This ensures it runs even if there are no code changes

trigger:
  branches:
    include:
    - main

pool:
  name: 'MyLocalLaptop'

variables:
- group: 'Portfolio-Secrets'
# New public path that bypasses "Access is denied" errors
- name: pythonExe
  value: 'C:\\Python312\\python.exe'

steps:
  - checkout: self
    clean: true

  - script: |
      "$(pythonExe)" -m pip install --upgrade pip
      if exist requirements.txt (
          "$(pythonExe)" -m pip install -r requirements.txt
      )
    displayName: 'Install dependencies'

  - script: |
      "$(pythonExe)" monitor_portfolio.py
    env:
      SLACK_TOKEN: $(SLACK_TOKEN)
      PYTHONUTF8: 1
    displayName: 'Run Portfolio Monitor'