name: Portfolio Monitor ETL

on:
  push:
    branches:
      - main
  schedule:
    # This covers 6:45 AM EDT to 19:45 PM EDT
    # UTC 10:45 to 23:45
    - cron: '45 10-23 * * *' # 10:15 AM to 7:15 PM EDT
    #- cron: '15 0-3 * * *'   # 8:15 PM to 11:15 PM EDT
  workflow_dispatch:

jobs:
  run-monitor:
    # This targets your local laptop runner
    runs-on: [self-hosted, PortfolioRunner]
    #runs-on: ubuntu-latest  the cloud run machine

    env:
      # Using the same public Python path from your Azure YAML
      PYTHON_EXE: 'C:\Python312\python.exe'
      PYTHONUTF8: 1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        # Use PowerShell to run the following steps in the Windows environment
        shell: powershell
        run: |
          & $env:PYTHON_EXE -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            & $env:PYTHON_EXE -m pip install -r requirements.txt
          }

      - name: Run Portfolio Monitor
        shell: powershell
        run: |
          & $env:PYTHON_EXE monitor_portfolio.py
        env:
          # Note: You must add SLACK_TOKEN to GitHub Settings > Secrets > Actions
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}